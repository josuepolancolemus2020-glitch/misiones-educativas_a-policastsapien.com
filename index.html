<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e3a7c">
  <title>M.E.T.A. — Misiones Educativas Tecnológicas Asincrónicas</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3063/3063822.png">
</head>
<body>

  <!-- ========== INICIO ========== -->
  <div id="view-inicio" class="view active">
    <header class="app-header">
      <div></div>
      <div class="brand-center">
        <div class="brand-logo">M.E.T.A.</div>
        <div class="brand-sub">Misiones Educativas Tecnológicas Asincrónicas</div>
      </div>
      <button class="notif-btn" id="notif-btn" aria-label="Notificaciones">
        <i class="fa-regular fa-bell"></i>
        <span class="notif-dot" id="notif-dot" hidden></span>
      </button>
    </header>
    <div class="view-scroll">

      <!-- Saludo y Motivación -->
      <div class="motivacion-card">
        <div class="motiv-greeting">
          <span class="motiv-avatar">🎓</span>
          <div>
            <div class="motiv-saludo">¡Hola,</div>
            <div class="motiv-nombre" id="home-name">Estudiante</div>
          </div>
        </div>
        <div class="motiv-cita">
          <p class="motiv-text" id="motiv-text"></p>
          <span class="motiv-autor" id="motiv-autor"></span>
        </div>
      </div>
    <div class="selectors-container">
        
        <div class="selector-group">
          <label><i class="fa-solid fa-earth-americas"></i> Elige tu País</label>
          <select id="country-select" class="custom-select">
            <option value="HN">🇭🇳 Honduras</option>
            <option value="MX" disabled>🇲🇽 México (Próximamente)</option>
            <option value="GT" disabled>🇬🇹 Guatemala (Próximamente)</option>
            <option value="SV" disabled>🇸🇻 El Salvador (Próximamente)</option>
            <option value="NI" disabled>🇳🇮 Nicaragua (Próximamente)</option>
            <option value="CR" disabled>🇨🇷 Costa Rica (Próximamente)</option>
            <option value="PA" disabled>🇵🇦 Panamá (Próximamente)</option>
          </select>
        </div>

        <div class="selector-group">
          <label><i class="fa-solid fa-graduation-cap"></i> Grado</label>
          <select id="grade-select" class="custom-select">
            <option value="1-3">1° a 3° Grado</option>
            <option value="4-6">4° a 6° Grado</option>
            <option value="7-9" selected>7° a 9° Grado</option>
            <option value="bach">Bachillerato</option>
          </select>
        </div>

      </div>
      <!-- Subjects -->
      <h2 class="section-title">Explorar por materia</h2>
      <div class="subjects-row">
        <button class="subj-chip esp" data-subject="español">
          <i class="fa-solid fa-book-open"></i>
          <span>Español</span>
          <em>5 misiones</em>
        </button>
        <button class="subj-chip mat" data-subject="matemáticas">
          <i class="fa-solid fa-superscript"></i>
          <span>Matemáticas</span>
          <em>3 misiones</em>
        </button>
        <button class="subj-chip cnat" data-subject="naturales">
          <i class="fa-solid fa-seedling"></i>
          <span>C. Naturales</span>
          <em>2 misiones</em>
        </button>
        <button class="subj-chip csoc" data-subject="sociales">
          <i class="fa-solid fa-earth-americas"></i>
          <span>C. Sociales</span>
          <em>3 misiones</em>
        </button>
      </div>

      <!-- Featured -->
      <h2 class="section-title">Misión destacada</h2>
      <div id="featured-card" class="featured-card"></div>

      <!-- Recent -->
      <div id="recent-wrap" hidden>
        <h2 class="section-title">Continúa explorando</h2>
        <div id="recent-list" class="small-list"></div>
      </div>

    </div>
  </div>

  <!-- ========== MISIONES ========== -->
  <div id="view-misiones" class="view">
    <header class="app-header compact">
      <div></div>
      <h1 class="view-title">Misiones</h1>
      <div></div>
    </header>
    <div class="view-scroll">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input id="search-input" type="search" placeholder="Buscar misión…" autocomplete="off">
      </div>
      <div class="pills-row">
        <button class="pill active" data-filter="all">Todas</button>
        <button class="pill" data-filter="español">Español</button>
        <button class="pill" data-filter="matemáticas">Matemáticas</button>
        <button class="pill" data-filter="naturales">C. Naturales</button>
        <button class="pill" data-filter="sociales">C. Sociales</button>
      </div>
      <div id="missions-container" class="missions-list"></div>
    </div>
  </div>

  <!-- ========== PROGRESO ========== -->
  <div id="view-progreso" class="view">
    <header class="app-header compact">
      <div></div>
      <h1 class="view-title">Mi Progreso</h1>
      <div></div>
    </header>
    <div class="view-scroll">
      <div id="progress-overview"></div>
      <div id="progress-subjects"></div>
      <div id="visited-missions"></div>
    </div>
  </div>

  <!-- ========== PERFIL ========== -->
  <div id="view-perfil" class="view">
    <header class="app-header compact">
      <div></div>
      <h1 class="view-title">Mi Perfil</h1>
      <div></div>
    </header>
    <div class="view-scroll">

      <div class="profile-hero">
        <div class="profile-emoji" id="prf-avatar">🌱</div>
        <div class="profile-name-disp" id="prf-name">Estudiante</div>
        <div class="profile-rank" id="prf-rank">Nivel 1 · Explorador · 0 XP</div>
      </div>

      <div class="setting-group">
        <label class="setting-label">Tu nombre</label>
        <input id="name-input" type="text" class="setting-input" placeholder="Escribe tu nombre…" maxlength="30">
        <button id="save-name-btn" class="save-btn">Guardar nombre</button>
      </div>

      <div class="setting-group">
        <label class="setting-label">Nivel de estudios</label>
        <div class="grade-grid" id="grade-grid">
          <button class="grade-btn" data-grade="1ciclo">2° Grado</button>
          <button class="grade-btn active" data-grade="2y3ciclo">II y III Ciclo</button>
          <button class="grade-btn" data-grade="bach">Bachillerato</button>
          <button class="grade-btn" data-grade="all">Todos los niveles</button>
        </div>
      </div>

      <div class="setting-group">
        <label class="setting-label">Mis estadísticas</label>
        <div class="stats-table">
          <div class="stats-row"><span>Misiones visitadas</span><strong id="prf-visited">0 / 13</strong></div>
          <div class="stats-row"><span>XP acumulado</span><strong id="prf-xp">0 XP</strong></div>
          <div class="stats-row"><span>Nivel actual</span><strong id="prf-level">Nivel 1</strong></div>
          <div class="stats-row"><span>Rango</span><strong id="prf-badge">Explorador</strong></div>
        </div>
      </div>

      <button id="reset-btn" class="reset-btn">
        <i class="fa-solid fa-arrow-rotate-left"></i> Reiniciar todo el progreso
      </button>

    </div>
  </div>

  <!-- ========== BOTTOM NAV ========== -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="view-inicio">
      <i class="fa-solid fa-house"></i>
      <span>Inicio</span>
    </button>
    <button class="nav-btn" data-view="view-misiones">
      <i class="fa-solid fa-rocket"></i>
      <span>Misiones</span>
    </button>
    <button class="nav-btn" data-view="view-progreso">
      <i class="fa-solid fa-chart-line"></i>
      <span>Progreso</span>
    </button>
    <button class="nav-btn" data-view="view-perfil">
      <i class="fa-solid fa-user"></i>
      <span>Perfil</span>
    </button>
  </nav>

  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
