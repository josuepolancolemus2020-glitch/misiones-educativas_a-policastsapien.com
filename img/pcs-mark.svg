<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 62 64">
  <!-- Sparkle stars -->
  <path d="M7,17 L8.2,12.5 L9.4,17 L13.8,18.2 L9.4,19.4 L8.2,23.9 L7,19.4 L2.6,18.2Z" fill="#0B1F4E"/>
  <path d="M53,13 L54,9.5 L55,13 L58.5,14 L55,15 L54,18.5 L53,15 L49.5,14Z" fill="#0B1F4E"/>
  <circle cx="16" cy="7" r="2.2" fill="#0B1F4E"/>
  <circle cx="46" cy="6" r="1.8" fill="#0B1F4E"/>
  <circle cx="6" cy="30" r="1.5" fill="#0B1F4E"/>
  <circle cx="56" cy="29" r="1.5" fill="#0B1F4E"/>

  <!-- Brain silhouette -->
  <path d="
    M31,11
    C36,4 47,7 49,15
    C51,23 46,30 42,32
    C47,34 48,40 44,43
    C40,46 34,45 31,43
    C28,45 22,46 18,43
    C14,40 15,34 20,32
    C16,30 11,23 13,15
    C15,7 26,4 31,11Z
  " fill="#0B1F4E"/>

  <!-- Central fissure -->
  <line x1="31" y1="14" x2="31" y2="41" stroke="#C5D8FF" stroke-width="1.4" opacity="0.35" stroke-linecap="round"/>
  <!-- Frontal sulcus lines -->
  <path d="M21,26 Q27,22 31,26" stroke="#C5D8FF" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M31,26 Q35,22 41,26" stroke="#C5D8FF" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M23,34 Q27,31 31,34" stroke="#C5D8FF" stroke-width="1" fill="none" opacity="0.25" stroke-linecap="round"/>

  <!-- Stem connecting brain to book -->
  <rect x="28" y="42" width="6" height="9" rx="2.5" fill="#0B1F4E"/>

  <!-- Open Book -->
  <!-- Left page -->
  <path d="M2,53 Q17,48 31,50 L31,62 Q17,59 2,62 Z" fill="#0B1F4E"/>
  <!-- Right page -->
  <path d="M31,50 Q45,48 60,53 L60,62 Q45,59 31,62 Z" fill="#0B1F4E"/>
  <!-- Spine shadow -->
  <rect x="29" y="50" width="4" height="12" rx="1.5" fill="#07193D"/>
  <!-- Page lines left -->
  <line x1="8" y1="54" x2="27" y2="52" stroke="white" stroke-width="1" opacity="0.2"/>
  <line x1="7" y1="57" x2="27" y2="55" stroke="white" stroke-width="1" opacity="0.2"/>
  <!-- Page lines right -->
  <line x1="35" y1="52" x2="54" y2="54" stroke="white" stroke-width="1" opacity="0.2"/>
  <line x1="35" y1="55" x2="54" y2="57" stroke="white" stroke-width="1" opacity="0.2"/>
</svg>
